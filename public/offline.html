<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akiva - Offline</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      .card {
        width: min(540px, calc(100vw - 2rem));
        border: 1px solid #fbcfe8;
        background: #fff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 40px rgba(236, 72, 153, 0.12);
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #ec4899;
        display: inline-block;
        margin-right: 8px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.25rem;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #475569;
      }
      button {
        margin-top: 16px;
        border: 0;
        border-radius: 10px;
        background: #ec4899;
        color: white;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0f172a;
          color: #f8fafc;
        }
        .card {
          background: #111827;
          border-color: #831843;
          box-shadow: none;
        }
        p {
          color: #cbd5e1;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1><span class="dot"></span>Akiva is running offline</h1>
      <p>
        The app shell and previously visited data are cached. Reconnect to sync the latest records.
      </p>
      <button onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
